<!DOCTYPE html>
<html>
<head>
<title>Car Game</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}
canvas {
  display: block;
  margin: auto;
  background: gray;
}
</style>
</head>

<body>

<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
let canvas = document.getElementById("gameCanvas");
let ctx = canvas.getContext("2d");

let car = {x:180, y:500, width:40, height:70};
let coins = [];
let enemies = [];
let score = 0;
let gameOver = false;

document.addEventListener("keydown", moveCar);

function moveCar(e){
  if(e.key === "ArrowLeft" && car.x > 0){
    car.x -= 20;
  }
  if(e.key === "ArrowRight" && car.x < 360){
    car.x += 20;
  }
}

function drawCar(){
  ctx.fillStyle = "blue";
  ctx.fillRect(car.x, car.y, car.width, car.height);
}

function drawCoins(){
  ctx.fillStyle = "yellow";
  coins.forEach((coin, i)=>{
    coin.y += 4;
    ctx.fillRect(coin.x, coin.y, 20, 20);

    if(
      coin.x < car.x + car.width &&
      coin.x + 20 > car.x &&
      coin.y < car.y + car.height &&
      coin.y + 20 > car.y
    ){
      coins.splice(i,1);
      score++;
    }
  });
}

function drawEnemies(){
  ctx.fillStyle = "red";
  enemies.forEach((enemy, i)=>{
    enemy.y += 6;
    ctx.fillRect(enemy.x, enemy.y, 40, 70);

    if(
      enemy.x < car.x + car.width &&
      enemy.x + 40 > car.x &&
      enemy.y < car.y + car.height &&
      enemy.y + 70 > car.y
    ){
      gameOver = true;
    }
  });
}

function drawScore(){
  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText("Score: " + score, 10, 30);
}

function update(){
  if(gameOver){
    ctx.fillStyle = "white";
    ctx.font = "40px Arial";
    ctx.fillText("GAME OVER", 80, 300);
    return;
  }

  ctx.clearRect(0,0,400,600);

  drawCar();
  drawCoins();
  drawEnemies();
  drawScore();

  requestAnimationFrame(update);
}

setInterval(()=>{
  coins.push({x: Math.random()*360, y:0});
}, 1500);

setInterval(()=>{
  enemies.push({x: Math.random()*360, y:0});
}, 2000);

update();
</script>

</body>
</html>
